<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olvasás Gyakorló</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--card:#1a1d2e;--accent:#f7c948;--pink:#ff6b9d;
  --teal:#4ecdc4;--text:#f0f0f8;--muted:#5a5f7d;--green:#6bcb77;--orange:#ffaa00;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 50%,#1e1060 0%,transparent 50%),
                   radial-gradient(ellipse at 80% 20%,#0d3348 0%,transparent 40%);
  color:var(--text);font-family:'Nunito',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding:20px;
}

/* TOP BAR */
.topbar{
  width:100%;max-width:720px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.topbar h1{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,2.2rem);color:var(--accent);
   text-shadow:0 0 30px rgba(247,201,72,.45);margin:0}
.exit-btn{
  background:rgba(255,107,157,.12);border:1.5px solid rgba(255,107,157,.35);
  color:var(--pink);font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;
  border-radius:12px;padding:8px 16px;cursor:pointer;
  transition:background .2s,transform .15s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.exit-btn:hover{background:rgba(255,107,157,.25);transform:scale(1.04)}
.exit-btn.hidden{visibility:hidden;pointer-events:none}

.sub{color:var(--muted);text-align:center;margin-bottom:20px;font-size:.88rem}
.card{background:var(--card);border-radius:26px;padding:26px;width:100%;max-width:720px;
      box-shadow:0 24px 64px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);margin-bottom:20px}

/* LABELS */
.lbl{font-weight:800;font-size:.78rem;text-transform:uppercase;letter-spacing:1px;
     color:var(--accent);margin-bottom:8px;display:block}

/* LANGUAGE GRID */
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.lang-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);
  border-radius:14px;padding:9px 5px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:border-color .2s,background .2s,transform .15s;color:var(--text)}
.lang-btn:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
.lang-btn.active{border-color:var(--accent);background:rgba(247,201,72,.12)}
.lang-flag{font-size:1.5rem;line-height:1}
.lang-name{font-size:.72rem;font-weight:700;color:var(--muted)}
.lang-btn.active .lang-name{color:var(--accent)}

/* TRANSLATION SETTINGS */
.trans-section{background:rgba(78,205,196,.06);border:1px solid rgba(78,205,196,.18);
               border-radius:16px;padding:14px;margin-bottom:18px}
.trans-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.trans-toggle-row.open{margin-bottom:12px}
.toggle-label{font-size:.88rem;font-weight:700;color:var(--teal)}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:999px;cursor:pointer;transition:.3s}
.slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
               background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--teal)}
input:checked+.slider:before{transform:translateX(20px)}

.trans-lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tlang-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:10px;padding:7px 4px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:border-color .2s,background .2s;color:var(--text)}
.tlang-btn:hover{background:rgba(255,255,255,.1)}
.tlang-btn.active{border-color:var(--teal);background:rgba(78,205,196,.12)}
.tlang-flag{font-size:1.2rem;line-height:1}
.tlang-name{font-size:.68rem;font-weight:700;color:var(--muted)}
.tlang-btn.active .tlang-name{color:var(--teal)}

/* SETUP */
textarea{width:100%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);
         border-radius:14px;padding:14px;color:var(--text);font-family:'Nunito',sans-serif;
         font-size:1rem;resize:vertical;outline:none;min-height:110px;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
.upload-area{width:100%;margin-top:12px;border:2px dashed rgba(255,255,255,.15);border-radius:14px;
  padding:14px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
  background:rgba(255,255,255,.03)}
.upload-area:hover{border-color:var(--teal);background:rgba(78,205,196,.06)}
.upload-area input{display:none}
.upload-icon{font-size:1.4rem;margin-bottom:3px}
.upload-label{font-size:.83rem;color:var(--muted)}
.upload-label span{color:var(--teal);font-weight:700}
.file-name{font-size:.8rem;color:var(--green);margin-top:4px;font-style:italic}
.sent-preview{margin-top:12px;display:none}
.sent-preview.show{display:block}
.sent-count{font-size:.8rem;color:var(--teal);margin-bottom:6px;font-weight:700}
.sent-list{max-height:110px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sent-item{background:rgba(255,255,255,.04);border-radius:8px;padding:5px 10px;
           font-size:.81rem;color:var(--muted);border-left:3px solid rgba(255,255,255,.1);
           white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.big{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--accent),#e8b800);
     color:#1a1a00;font-family:'Fredoka One',cursive;font-size:1.15rem;border:none;
     border-radius:14px;padding:13px;cursor:pointer;box-shadow:0 4px 20px rgba(247,201,72,.35);transition:transform .15s}
.big:hover{transform:translateY(-2px)}
.big:disabled{opacity:.4;cursor:default;transform:none}

/* LEVEL */
.sent-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sp-label{font-size:.76rem;color:var(--muted);flex-shrink:0}
.sp-dots{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.sp-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.sp-dot.done{background:var(--green)}.sp-dot.active{background:var(--accent);transform:scale(1.4)}
.lang-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(247,201,72,.1);
            border:1px solid rgba(247,201,72,.22);border-radius:999px;
            padding:3px 9px;font-size:.76rem;color:var(--accent);font-weight:700;flex-shrink:0}

.lhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dot{width:13px;height:13px;border-radius:50%;background:var(--muted);transition:all .3s;flex-shrink:0}
.dot.active{background:var(--accent);transform:scale(1.5)}.dot.done{background:var(--green)}
.lname{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--teal)}
.instr{font-size:.82rem;color:var(--muted);line-height:1.6;
       background:rgba(255,255,255,.04);border-radius:10px;padding:8px 12px;margin-bottom:10px}

/* TTS BANNER */
.tts-banner{display:flex;align-items:center;gap:10px;background:rgba(78,205,196,.1);
  border:1px solid rgba(78,205,196,.3);border-radius:14px;padding:10px 14px;margin-bottom:10px}
.tts-banner.hidden{display:none}
.tts-icon{font-size:1.4rem;animation:speakpulse .6s ease-in-out infinite alternate;flex-shrink:0}
@keyframes speakpulse{0%{transform:scale(1)}100%{transform:scale(1.2)}}
.tts-text{font-size:.86rem;color:var(--teal);font-weight:700;flex:1}
.tts-again{background:rgba(78,205,196,.15);border:1px solid rgba(78,205,196,.3);
           color:var(--teal);border-radius:8px;padding:5px 12px;cursor:pointer;
           font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;
           transition:background .2s;white-space:nowrap}
.tts-again:hover{background:rgba(78,205,196,.28)}

/* KARAOKE */
.karaoke-wrap{background:rgba(255,255,255,.04);border-radius:18px;
  padding:20px 18px;margin:10px 0;font-size:1.22rem;font-weight:700;line-height:2.1;
  text-align:center;word-break:break-word;min-height:75px;position:relative;transition:background .5s}
.karaoke-wrap.flash{animation:flash .8s ease}
@keyframes flash{40%{background:rgba(107,203,119,.22)}}
.ghost-text{position:absolute;inset:0;border-radius:18px;padding:20px 18px;pointer-events:none;
  font-size:1.22rem;font-weight:700;line-height:2.1;text-align:center;
  color:rgba(240,240,248,.11);opacity:0;transition:opacity 1.4s;word-break:break-word}
.ghost-text.show{opacity:1}

.kw{display:inline;white-space:pre-wrap;transition:color .15s,text-shadow .15s}
.kw.done{color:var(--accent)}
.kw.cur{color:var(--pink);text-shadow:0 0 18px rgba(255,107,157,.75);animation:kpulse .9s ease-in-out infinite}
.kw.todo{color:rgba(240,240,248,.25)}
.kw.interim{color:#fff;text-shadow:0 0 20px rgba(255,255,255,.6);animation:none}
.kw.blank{color:transparent;background:rgba(255,255,255,.1);border-radius:5px;border-bottom:2px solid rgba(255,255,255,.22);padding:0 3px}
.kw.blank.cur{color:transparent;background:rgba(255,107,157,.18);border-bottom:2px solid var(--pink);animation:kpulse .9s ease-in-out infinite}
.kw.blank.interim{color:var(--text);background:rgba(255,255,255,.2);border-bottom:2px solid #fff;animation:none}
.kw.blank.done{color:var(--accent);background:rgba(247,201,72,.13);border-bottom:2px solid var(--accent)}
.kw.blank.hint-show{color:var(--orange)!important;background:rgba(255,170,0,.15)!important;border-bottom:2px solid var(--orange)!important}
.kw.hidden{color:transparent}
.kw.revealed{color:var(--green)}
.kw.cur-l3{color:var(--pink);text-shadow:0 0 18px rgba(255,107,157,.75);animation:kpulse .9s ease-in-out infinite}
.kw.cur-l3.interim{color:#fff;text-shadow:0 0 20px rgba(255,255,255,.6);animation:none}
.kw.hint-show{color:var(--orange)!important;text-shadow:0 0 12px rgba(255,170,0,.4)!important;animation:none!important}
@keyframes kpulse{0%,100%{text-shadow:0 0 8px rgba(255,107,157,.6)}50%{text-shadow:0 0 26px rgba(255,107,157,.95)}}

/* TRANSLATION DISPLAY */
.trans-display{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:10px 16px;margin-top:-4px;margin-bottom:10px;
  font-size:.9rem;color:rgba(240,240,248,.35);font-style:italic;
  text-align:center;line-height:1.6;min-height:36px;
  transition:opacity .3s;
}
.trans-display.loading{color:rgba(240,240,248,.2)}
.trans-display.hidden{display:none}

/* PROGRESS */
.prog{background:rgba(255,255,255,.07);border-radius:999px;height:7px;overflow:hidden;margin:0 0 10px}
.pfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--accent));width:0;transition:width .3s ease}

.mic-status-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);
  border-radius:12px;padding:7px 12px;margin-bottom:8px;min-height:38px}
.mic-wave{display:flex;gap:3px;align-items:center;flex-shrink:0}
.mic-wave span{display:block;width:3px;background:var(--teal);border-radius:99px;height:7px;opacity:.3}
.mic-wave.active span{opacity:1}
.mic-wave.active span:nth-child(1){animation:wave .8s ease-in-out infinite 0.0s}
.mic-wave.active span:nth-child(2){animation:wave .8s ease-in-out infinite .15s}
.mic-wave.active span:nth-child(3){animation:wave .8s ease-in-out infinite .3s}
.mic-wave.active span:nth-child(4){animation:wave .8s ease-in-out infinite .45s}
.mic-wave.active span:nth-child(5){animation:wave .8s ease-in-out infinite .6s}
@keyframes wave{0%,100%{height:4px}50%{height:16px}}
.mic-status-text{font-size:.82rem;color:var(--teal);font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mic-status-text.idle{color:var(--muted);font-style:normal}

.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:7px;margin:5px 0 3px}
#micBtn{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;font-size:1.8rem;
        display:flex;align-items:center;justify-content:center;
        background:linear-gradient(135deg,var(--pink),#c23a7d);
        box-shadow:0 4px 22px rgba(255,107,157,.4);transition:transform .15s}
#micBtn:hover{transform:scale(1.08)}
#micBtn.rec{background:linear-gradient(135deg,#ff3d3d,#b81a1a);animation:mpulse 1s ease-in-out infinite}
#micBtn:disabled{opacity:.4;cursor:default;transform:none!important;animation:none}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,61,61,.55)}50%{box-shadow:0 0 0 16px rgba(255,61,61,0)}}
.mlbl{font-size:.82rem;color:var(--muted);text-align:center}
.mlbl.rec{color:var(--teal);font-weight:700}

.hint-box{background:rgba(247,201,72,.08);border:1px solid rgba(247,201,72,.28);
          border-radius:12px;padding:8px 12px;font-size:.82rem;
          color:rgba(247,201,72,.92);margin-bottom:8px;line-height:1.55;display:none}
.hint-box.on{display:block}
.err{background:rgba(255,100,61,.1);border:1px solid rgba(255,100,61,.3);
     border-radius:12px;padding:8px 12px;font-size:.82rem;color:#ff8f6b;margin-bottom:8px;display:none}
.err.on{display:block}

.res{text-align:center;padding:10px 0;display:none}
.res.on{display:block}
.ri{font-size:2.2rem;margin-bottom:4px}
.rm{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--green);margin-bottom:12px}
.brow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bsec{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text);
      font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;
      border-radius:12px;padding:9px 18px;cursor:pointer;transition:background .2s}
.bsec:hover{background:rgba(255,255,255,.14)}
.bpri{background:linear-gradient(135deg,var(--green),#3a9f44);color:#0a1a0b;
      font-family:'Fredoka One',cursive;font-size:.92rem;border:none;
      border-radius:12px;padding:9px 22px;cursor:pointer;
      box-shadow:0 4px 14px rgba(107,203,119,.32);transition:transform .15s}
.bpri:hover{transform:translateY(-2px)}
.mt{margin-top:6px;text-align:center}

.alldone{text-align:center}
.trophy{font-size:4.5rem;display:block;animation:float 2.2s ease-in-out infinite;margin-bottom:12px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.alldone p{color:var(--muted);margin-bottom:20px}
.hidden{display:none!important}
.sent-list::-webkit-scrollbar{width:4px}
.sent-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}
</style>
</head>
<body>

<!-- TOP BAR – always visible -->
<div class="topbar">
  <h1>📖 Olvasás Gyakorló</h1>
  <button class="exit-btn hidden" id="exitBtn" onclick="exitToHome()">🏠 Kilépés</button>
</div>
<p class="sub" id="appSub"></p>

<div class="card">

  <!-- ── SETUP ── -->
  <div id="sSetup">
    <span class="lbl" id="lblLang"></span>
    <div class="lang-grid">
      <button class="lang-btn active" onclick="setLang('hu')" id="langHU"><span class="lang-flag">🇭🇺</span><span class="lang-name">Magyar</span></button>
      <button class="lang-btn" onclick="setLang('en')" id="langEN"><span class="lang-flag">🇬🇧</span><span class="lang-name">English</span></button>
      <button class="lang-btn" onclick="setLang('de')" id="langDE"><span class="lang-flag">🇩🇪</span><span class="lang-name">Deutsch</span></button>
      <button class="lang-btn" onclick="setLang('es')" id="langES"><span class="lang-flag">🇪🇸</span><span class="lang-name">Español</span></button>
    </div>

    <!-- Translation settings -->
    <div class="trans-section">
      <div class="trans-toggle-row" id="transToggleRow">
        <span class="toggle-label" id="transToggleLabel"></span>
        <label class="toggle-switch">
          <input type="checkbox" id="transToggle" onchange="onTransToggle()">
          <span class="slider"></span>
        </label>
      </div>
      <div id="transLangPicker" class="hidden" style="margin-top:12px">
        <span class="lbl" id="lblTransLang" style="margin-bottom:8px"></span>
        <div class="trans-lang-grid">
          <button class="tlang-btn" onclick="setTransLang('hu')" id="tlangHU"><span class="tlang-flag">🇭🇺</span><span class="tlang-name">Magyar</span></button>
          <button class="tlang-btn" onclick="setTransLang('en')" id="tlangEN"><span class="tlang-flag">🇬🇧</span><span class="tlang-name">English</span></button>
          <button class="tlang-btn" onclick="setTransLang('de')" id="tlangDE"><span class="tlang-flag">🇩🇪</span><span class="tlang-name">Deutsch</span></button>
          <button class="tlang-btn" onclick="setTransLang('es')" id="tlangES"><span class="tlang-flag">🇪🇸</span><span class="tlang-name">Español</span></button>
        </div>
      </div>
    </div>

    <span class="lbl" id="lblText"></span>
    <textarea id="sinput" placeholder=""></textarea>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".txt,.md" onchange="loadFile(event)">
      <div class="upload-icon">📄</div>
      <div class="upload-label" id="uploadLabel"></div>
      <div class="file-name" id="fileName"></div>
    </div>
    <div class="sent-preview" id="sentPreview">
      <div class="sent-count" id="sentCount"></div>
      <div class="sent-list" id="sentList"></div>
    </div>
    <button class="big" id="startBtn" onclick="startPractice()" disabled></button>
  </div>

  <!-- ── LEVEL ── -->
  <div id="sLevel" class="hidden">
    <div class="sent-progress">
      <span class="sp-label" id="spLabel"></span>
      <div class="sp-dots" id="spDots"></div>
      <span class="lang-badge" id="activeLangBadge"></span>
    </div>
    <div class="lhdr">
      <div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      <span class="lname" id="lname"></span>
    </div>
    <div class="instr" id="instr"></div>
    <div class="hint-box" id="hintBox"></div>
    <div class="err" id="errBox"></div>

    <div class="tts-banner hidden" id="ttsBanner">
      <span class="tts-icon">🔊</span>
      <span class="tts-text" id="ttsText"></span>
      <button class="tts-again" id="ttsAgainBtn" onclick="speakAgain()"></button>
    </div>

    <div class="karaoke-wrap" id="karaokeWrap">
      <div class="ghost-text" id="ghostText"></div>
      <div id="karaokeText"></div>
    </div>

    <!-- Translation display (shown below karaoke) -->
    <div class="trans-display hidden" id="transDisplay"></div>

    <div class="prog"><div class="pfill" id="pfill"></div></div>

    <div class="mic-status-wrap">
      <div class="mic-wave" id="micWave"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="mic-status-text idle" id="micStatusText"></div>
    </div>

    <div class="mic-wrap">
      <button id="micBtn" onclick="toggleMic()" disabled>🎤</button>
      <span class="mlbl" id="mlbl"></span>
    </div>

    <div class="res" id="resBox">
      <div class="ri" id="rIcon">🌟</div>
      <div class="rm" id="rMsg"></div>
      <div class="brow">
        <button class="bsec" id="retryBtn" onclick="retry()"></button>
        <button class="bpri" id="nextBtn" onclick="nextAction()"></button>
      </div>
    </div>
    <div class="mt"><button class="bsec" id="retrySmall" onclick="retry()"></button></div>
  </div>

  <!-- ── ALL DONE ── -->
  <div id="sDone" class="hidden alldone">
    <span class="trophy">🏆</span>
    <div class="rm" id="doneTitle" style="font-size:1.8rem"></div>
    <p id="doneMsg" style="color:var(--muted);margin-bottom:20px"></p>
    <button class="big" id="newTextBtn" onclick="exitToHome()"></button>
  </div>

</div>

<script>
// ── LANGUAGE DEFINITIONS ───────────────────────────────────────────
const LANGS={
  hu:{code:'hu-HU',flag:'🇭🇺',name:'Magyar',ui:{
    sub:'Tanulj meg szöveget fejből – mondatról mondatra',
    lblLang:'Tanulás nyelve:',lblText:'Írd be vagy illeszd be a szöveget:',
    placeholder:'Ide írj több mondatot. Minden mondatot külön kezeljük!\n\nPl.: A Nap süt. Szép idő van.',
    uploadLabel:'Kattints a <span>fájl feltöltéséhez</span> (.txt)',
    startBtn:'🚀 Kezdjük el!',spLabel:'Mondatok:',

// Translation language names per UI language
const TRANS_LANG_NAMES={
  hu:{hu:'Magyar',en:'Angol',de:'Német',es:'Spanyol'},
  en:{hu:'Hungarian',en:'English',de:'German',es:'Spanish'},
  de:{hu:'Ungarisch',en:'Englisch',de:'Deutsch',es:'Spanisch'},
  es:{hu:'Húngaro',en:'Inglés',de:'Alemán',es:'Español'},
};

// MyMemory language codes
const MYMEMORY_CODES={hu:'hu',en:'en',de:'de',es:'es'};

// ── STATE ──────────────────────────────────────────────────────────
let currentLang='hu', transLang='en', showTrans=false;
let sentences=[], sentIdx=0, words=[], level=1, wordIdx=0, attempts=0;
let hintShown=false, ghostVis=false, finished=false;
let recognition=null, isRec=false;
let hintWords=new Set(), interimWordIdx=-1;
let ttsActive=false;
// Translation cache: key = sentIdx+transLang
let transCache={};

function L(){return LANGS[currentLang].ui;}

// ── TRANSLATION ────────────────────────────────────────────────────
async function fetchTranslation(text, fromLang, toLang){
  const cacheKey=fromLang+'→'+toLang+':'+text;
  if(transCache[cacheKey]) return transCache[cacheKey];
  // Same language → no need to translate
  if(fromLang===toLang) return text;
  try{
    const from=MYMEMORY_CODES[fromLang]||fromLang;
    const to=MYMEMORY_CODES[toLang]||toLang;
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
    const resp=await fetch(url);
    const data=await resp.json();
    const result=data?.responseData?.translatedText||text;
    transCache[cacheKey]=result;
    return result;
  }catch(e){return text;}
}

async function loadAndShowTranslation(){
  const display=document.getElementById('transDisplay');
  if(!showTrans){display.classList.add('hidden');return;}
  display.classList.remove('hidden');
  display.classList.add('loading');
  display.textContent=L().transLoading;
  const text=sentences[sentIdx]||'';
  const translated=await fetchTranslation(text,currentLang,transLang);
  display.classList.remove('loading');
  display.textContent=translated===text&&currentLang!==transLang?'—':translated;
}

function exitToHome(){

  showScreen('sSetup');

  sentences=[];sentIdx=0;wordIdx=0;level=1;attempts=0;

  document.getElementById('sentPreview').classList.remove('show');
  document.getElementById('startBtn').disabled=true;
  document.getElementById('fileName').textContent='';

// ── SETUP ─────────────────────────────────────────────────────────
function parseSentences(text){
  const result=[];
  text.replace(/\r\n/g,'\n').split('\n').map(l=>l.trim()).filter(l=>l.length>1).forEach(line=>{
    const parts=line.match(/[^.!?]+[.!?]+|[^.!?]+$/g);
    if(parts)parts.forEach(p=>{const t=p.trim();if(t.length>1)result.push(t);});
    else if(line.trim().length>1)result.push(line.trim());
  });
  return result;
}

document.getElementById('sinput').addEventListener('input',()=>{
  sentences=parseSentences(document.getElementById('sinput').value.trim());
  updatePreview();
});

function loadFile(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById('fileName').textContent='📎 '+file.name;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('sinput').value=ev.target.result;
    sentences=parseSentences(ev.target.result);updatePreview();};
  r.readAsText(file,'UTF-8');
}

function updatePreview(){
  const ok=sentences.length>0;
  document.getElementById('sentPreview').classList.toggle('show',ok);
  document.getElementById('startBtn').disabled=!ok;
  if(!ok)return;
  document.getElementById('sentCount').textContent=L().sentCount(sentences.length);
  const list=document.getElementById('sentList');list.innerHTML='';
  sentences.forEach((s,i)=>{
    const d=document.createElement('div');d.className='sent-item';
    d.textContent=(i+1)+'. '+s;list.appendChild(d);
  });
}

function showScreen(id){
  ['sSetup','sLevel','sDone'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==id));
}

function startPractice(){
  if(!sentences.length)return;
  sentIdx=0;level=1;attempts=0;
  document.getElementById('exitBtn').classList.remove('hidden');
  showScreen('sLevel');buildSentDots();loadSentence();
}

function buildSentDots(){
  const w=document.getElementById('spDots');w.innerHTML='';
  sentences.forEach((_,i)=>{const d=document.createElement('div');
    d.className='sp-dot'+(i===sentIdx?' active':i<sentIdx?' done':'');d.id='sp-'+i;w.appendChild(d);});
}
function updateSentDots(){
  sentences.forEach((_,i)=>{const d=document.getElementById('sp-'+i);
    if(d)d.className='sp-dot'+(i===sentIdx?' active':i<sentIdx?' done':'');});
}

function loadSentence(){
  words=sentences[sentIdx].split(/\s+/).filter(Boolean);
  wordIdx=0;hintShown=false;ghostVis=false;finished=false;
  attempts=0;hintWords=new Set();interimWordIdx=-1;
  level=1;setupLevel();updateSentDots();
}

// ── LEVEL SETUP ───────────────────────────────────────────────────
const BLANK=3;
function blankSet(){const s=new Set();for(let i=BLANK-1;i<words.length;i+=BLANK)s.add(i);return s;}

function setupLevel(){
  wordIdx=0;finished=false;hintWords=new Set();interimWordIdx=-1;attempts++;
  const u=L();
  document.getElementById('resBox').classList.remove('on');
  document.getElementById('retrySmall').classList.remove('hidden');
  document.getElementById('hintBox').classList.remove('on');
  document.getElementById('errBox').classList.remove('on');
  document.getElementById('pfill').style.width='0%';
  document.getElementById('ghostText').classList.remove('show');
  document.getElementById('ghostText').textContent='';
  document.getElementById('karaokeWrap').classList.remove('flash');
  document.getElementById('ttsBanner').classList.add('hidden');
  stopRec();

  for(let i=1;i<=3;i++)document.getElementById('d'+i).className='dot'+(i<level?' done':i===level?' active':'');
  document.getElementById('lname').textContent=u.lvl[level-1];
  document.getElementById('instr').textContent=u.instr[level-1];
  document.getElementById('spLabel').textContent=u.spLabel;
  document.getElementById('activeLangBadge').textContent=LANGS[currentLang].flag+' '+LANGS[currentLang].name;
  const isLast=sentIdx>=sentences.length-1;
  document.getElementById('nextBtn').textContent=level<3?u.nextLevel:(isLast?u.finish:u.nextSent);
  document.getElementById('retryBtn').textContent=u.retry;
  document.getElementById('retrySmall').textContent=u.retrySmall;
  document.getElementById('mlbl').textContent=u.micLabel;
  document.getElementById('ttsAgainBtn').textContent=u.ttsAgain;

  if(level===3)document.getElementById('ghostText').textContent=sentences[sentIdx];
  renderKaraoke();

  // Load translation
  loadAndShowTranslation();

  // Speak sentence, then enable mic
  document.getElementById('micBtn').disabled=true;
  setMicStatus('idle',u.ttsSpeaking);
  speakCurrentSentence(()=>{
    document.getElementById('micBtn').disabled=false;
    setMicStatus('idle',u.micIdle);
  });
}

// ── TTS ───────────────────────────────────────────────────────────
function speak(text,onDone){
  if(!window.speechSynthesis){onDone&&onDone();return;}
  window.speechSynthesis.cancel();ttsActive=true;
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang=LANGS[currentLang].code;utter.rate=0.88;utter.pitch=1.05;
  const voices=window.speechSynthesis.getVoices();
  const lc=LANGS[currentLang].code.toLowerCase();
  const match=voices.find(v=>v.lang.toLowerCase()===lc)||voices.find(v=>v.lang.toLowerCase().startsWith(lc.split('-')[0]));
  if(match)utter.voice=match;
  const banner=document.getElementById('ttsBanner');
  banner.classList.remove('hidden');
  document.getElementById('ttsText').textContent=L().ttsSpeaking;
  utter.onend=()=>{ttsActive=false;document.getElementById('ttsText').textContent=L().ttsDone;onDone&&onDone();};
  utter.onerror=()=>{ttsActive=false;banner.classList.add('hidden');onDone&&onDone();};
  if(!voices.length){
    window.speechSynthesis.onvoiceschanged=()=>{
      const v2=window.speechSynthesis.getVoices();
      const m2=v2.find(v=>v.lang.toLowerCase()===lc)||v2.find(v=>v.lang.toLowerCase().startsWith(lc.split('-')[0]));
      if(m2)utter.voice=m2;window.speechSynthesis.speak(utter);
    };
  }else window.speechSynthesis.speak(utter);
}

function speakCurrentSentence(onDone){speak(sentences[sentIdx],onDone);}

function speakAgain(){
  if(ttsActive){window.speechSynthesis.cancel();ttsActive=false;}
  stopRec();document.getElementById('micBtn').disabled=true;
  speakCurrentSentence(()=>document.getElementById('micBtn').disabled=false);
}

// ── RENDER ────────────────────────────────────────────────────────
function renderKaraoke(){
  const c=document.getElementById('karaokeText');c.innerHTML='';
  const bl=blankSet();
  words.forEach((w,i)=>{
    const sp=document.createElement('span');
    const isHint=hintWords.has(i),isInterim=(i===interimWordIdx&&i>=wordIdx);
    if(level===1){
      if(i<wordIdx)       {sp.className='kw done';sp.textContent=w;}
      else if(i===wordIdx){sp.className='kw cur'+(isInterim?' interim':'');sp.textContent=w;}
      else                {sp.className='kw todo';sp.textContent=w;}
    }else if(level===2){
      if(bl.has(i)){
        if(i<wordIdx)       {sp.className='kw blank done';sp.textContent=w;}
        else if(i===wordIdx){
          if(isHint)        {sp.className='kw blank hint-show';sp.textContent=w;}
          else if(isInterim){sp.className='kw blank interim';sp.textContent=w;}
          else              {sp.className='kw blank cur';sp.textContent=w;}
        }else{sp.className=isHint?'kw blank hint-show':'kw blank';sp.textContent=w;}
      }else{
        if(i<wordIdx)       {sp.className='kw done';sp.textContent=w;}
        else if(i===wordIdx){sp.className='kw cur'+(isInterim?' interim':'');sp.textContent=w;}
        else                {sp.className='kw todo';sp.textContent=w;}
      }
    }else{
      if(i<wordIdx)       {sp.className='kw revealed';sp.textContent=w;}
      else if(i===wordIdx){
        if(isHint)        {sp.className='kw hint-show';sp.textContent=w;}
        else if(isInterim){sp.className='kw cur-l3 interim';sp.textContent=w;}
        else              {sp.className='kw cur-l3';sp.textContent='▮';}
      }else{sp.className=isHint?'kw hint-show':'kw hidden';sp.textContent=w;}
    }
    if(i<words.length-1)sp.textContent+=' ';
    c.appendChild(sp);
  });
  if(level===3&&ghostVis)document.getElementById('ghostText').classList.add('show');
}

// ── MIC STATUS ────────────────────────────────────────────────────
function setMicStatus(type,text){
  document.getElementById('micStatusText').textContent=text;
  document.getElementById('micStatusText').className='mic-status-text'+(type==='idle'?' idle':'');
  document.getElementById('micWave').classList.toggle('active',type!=='idle');
}

// ── MICROPHONE ────────────────────────────────────────────────────
function toggleMic(){if(isRec)stopRec();else startRec();}

function makeRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const rec=new SR();
  rec.lang=LANGS[currentLang].code;rec.continuous=true;rec.interimResults=true;rec.maxAlternatives=3;
  return rec;
}

function attachHandlers(rec){
  rec.onstart=()=>setMicStatus('listening',L().micListening);
  rec.onresult=e=>{
    let finalText='',interimText='',hasFinal=false;
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal){finalText+=e.results[i][0].transcript+' ';hasFinal=true;}
      else interimText+=e.results[i][0].transcript;
    }
    if(interimText){
      setMicStatus('interim','🔤 '+interimText);
      const im=tryMatch(finalText+' '+interimText,wordIdx);
      interimWordIdx=im>wordIdx?im:tryMatchPartial(interimText,wordIdx);
      renderKaraoke();
    }
    if(hasFinal){
      const ni=tryMatch(finalText,wordIdx);
      if(ni>wordIdx){
        wordIdx=ni;interimWordIdx=-1;
        document.getElementById('pfill').style.width=Math.min(100,wordIdx/words.length*100)+'%';
        applyHints();
        if(wordIdx>=words.length){
          finished=true;stopRec();setMicStatus('idle',L().done);
          renderKaraoke();
          if(level===1)document.getElementById('karaokeWrap').classList.add('flash');
          setTimeout(showSuccess,500);
        }else{renderKaraoke();setMicStatus('listening',L().micListening);}
      }
    }
  };
  rec.onerror=e=>{
    if(e.error==='not-allowed'){showErr(L().errMic);stopRec();return;}
    if(isRec&&!finished)setTimeout(()=>{if(isRec&&!finished)restartRec();},300);
  };
  rec.onend=()=>{if(isRec&&!finished)setTimeout(()=>{if(isRec&&!finished)restartRec();},200);};
}

function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showErr(L().errBrowser);return;}
  const rec=makeRec();if(!rec)return;
  attachHandlers(rec);recognition=rec;
  try{rec.start();}catch(e){}
  isRec=true;
  document.getElementById('micBtn').classList.add('rec');
  document.getElementById('micBtn').textContent='⏹';
  document.getElementById('mlbl').textContent=L().micRecLabel;
  document.getElementById('mlbl').classList.add('rec');
}

function restartRec(){
  const rec=makeRec();if(!rec)return;
  attachHandlers(rec);recognition=rec;try{rec.start();}catch(e){}
}

function stopRec(){
  isRec=false;
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  document.getElementById('micBtn').classList.remove('rec');
  document.getElementById('micBtn').textContent='🎤';
  document.getElementById('mlbl').textContent=L().micLabel;
  document.getElementById('mlbl').classList.remove('rec');
  if(!finished)setMicStatus('idle',L().micIdle);
}

// ── MATCHING ──────────────────────────────────────────────────────
function norm(s){return s.toLowerCase().replace(/[.,!?;:"'()–—«»„""''¡¿]/g,'').trim();}
function lev(a,b){
  if(a===b)return 0;const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  let prev=Array.from({length:n+1},(_,j)=>j);
  for(let i=1;i<=m;i++){const cur=[i];
    for(let j=1;j<=n;j++)cur[j]=a[i-1]===b[j-1]?prev[j-1]:1+Math.min(prev[j],cur[j-1],prev[j-1]);
    prev=cur;}return prev[n];
}
function wordMatches(said,target){
  if(!said||!target)return false;if(said===target)return true;
  if(said.startsWith(target)||target.startsWith(said))return true;
  if(target.length>=4&&lev(said,target)<=1)return true;
  if(target.length>=6&&lev(said,target)<=2)return true;
  return false;
}
function tryMatch(text,startIdx){
  const spoken=norm(text).split(/\s+/).filter(Boolean);if(!spoken.length)return startIdx;
  let wi=startIdx;
  for(let si=0;si<spoken.length&&wi<words.length;si++)
    if(wordMatches(spoken[si],norm(words[wi])))wi++;
  return wi;
}
function tryMatchPartial(text,startIdx){
  if(startIdx>=words.length)return -1;
  const spoken=norm(text).split(/\s+/).filter(Boolean);const target=norm(words[startIdx]);
  for(const s of spoken)if(s.length>=2&&(target.startsWith(s)||wordMatches(s,target)))return startIdx;
  return -1;
}

// ── HINTS & RESULT ────────────────────────────────────────────────
function applyHints(){
  if(attempts<2)return;
  if(hintShown){hintWords=new Set([wordIdx]);return;}
  if((level===2||level===3)&&wordIdx<words.length){
    hintWords=new Set([wordIdx]);if(level===3)ghostVis=true;
    const h=document.getElementById('hintBox');
    h.textContent=level===2?L().hintL2:L().hintL3;h.classList.add('on');hintShown=true;
  }
}
function showErr(msg){const e=document.getElementById('errBox');e.textContent=msg;e.classList.add('on');}

function showSuccess(){
  const u=L(),isLast=sentIdx>=sentences.length-1;
  document.getElementById('rIcon').textContent=level>=3?(isLast?'🏆':'⭐'):'🌟';
  document.getElementById('rMsg').textContent=level===1?u.successL1:level===2?u.successL2:isLast?u.successL3last:u.successL3next;
  document.getElementById('nextBtn').textContent=level<3?u.nextLevel:(isLast?u.finish:u.nextSent);
  document.getElementById('retryBtn').textContent=u.retry;
  document.getElementById('resBox').classList.add('on');
  document.getElementById('retrySmall').classList.add('hidden');
}

function retry(){
  hintWords=new Set();hintShown=false;ghostVis=false;interimWordIdx=-1;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  stopRec();setupLevel();
}
function nextAction(){
  stopRec();window.speechSynthesis&&window.speechSynthesis.cancel();
  if(level<3){level++;attempts=0;hintWords=new Set();hintShown=false;ghostVis=false;setupLevel();}
  else{
    sentIdx++;
    if(sentIdx>=sentences.length){
      const u=L();
      document.getElementById('doneTitle').textContent=u.doneTitle;
      document.getElementById('doneMsg').textContent=u.doneMsg;
      document.getElementById('newTextBtn').textContent=u.newText;
      showScreen('sDone');
    }else{level=1;attempts=0;loadSentence();}
  }
}

// Init
applyUI();
// Auto-select translation lang (not same as practice lang)
transLang=currentLang==='hu'?'en':'hu';
updateTransLangBtns();
</script>
